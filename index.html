<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ 会話チェック反応（大学生向け）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for multi-select and improved aesthetics */
        select[multiple] {
            height: 150px;
            width: 200px;
            background-color: #f9fafb;
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        select[multiple] option {
            padding: 0.25rem;
        }
        select[multiple] option:checked {
            background-color: #4f46e5;
            color: white;
        }
        .gradient-bg {
            background: linear-gradient(to bottom right, #e0f2fe, #e0e7ff);
        }
        .question-card {
            transition: all 0.3s ease;
        }
        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid #E0E4EA;
            color: #6B7280;
            font-size: 0.9em;
            font-family: 'Roboto', sans-serif;
        }
        /* PCの標準スピンボタン（トグル）を非表示にしてデザインを統一 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="gradient-bg font-sans min-h-screen">
    <div class="container mx-auto p-6">
        <h1 class="text-4xl font-extrabold text-center text-indigo-800 mb-8">IQ 会話チェック反応（大学生向け）</h1>
                
        <div class="mb-4 flex flex-wrap justify-center items-center gap-4">
            <button id="playAllBtn" class="bg-teal-500 text-white px-6 py-3 rounded-lg hover:bg-teal-600 transition duration-200 shadow-md font-medium">すべて表示 Chọn tất cả</button>
            <button id="playLessonBtn" class="bg-indigo-500 text-white px-6 py-3 rounded-lg hover:bg-indigo-600 transition duration-200 shadow-md font-medium">個別表示 Chọn bài</button>
        </div>

        <div class="mb-8 flex flex-col items-center">
            <label for="pauseInput" class="text-sm font-medium text-gray-600 mb-1">再生間隔/秒 Khoảng dừng (giây):</label>
            <div class="flex items-center">
                <div class="bg-white p-1 rounded-lg shadow-sm border border-gray-200 flex items-center">
                    <button id="minusBtn" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-l-md transition duration-150 active:scale-95 select-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15"></path></svg>
                    </button>
                    <input type="number" id="pauseInput" value="3" min="0" max="30" class="w-16 h-10 border-y border-transparent text-center focus:outline-none font-bold text-xl text-indigo-700 bg-white" readonly>
                    <button id="plusBtn" class="w-10 h-10 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-r-md transition duration-150 active:scale-95 select-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
                    </button>
                </div>
                <button id="stopBtn" class="ml-3 h-12 bg-red-500 text-white px-6 rounded-lg hover:bg-red-600 transition duration-200 shadow-md font-medium flex items-center justify-center active:scale-95">
                    停止 Dừng
                </button>
            </div>
        </div>

        <div id="lessonSelectContainer" class="hidden mb-8 flex justify-center space-x-4">
            <select id="lessonSelect" multiple class="border border-gray-300 focus:ring-2 focus:ring-indigo-500">
            </select>
            <button id="confirmBtn" class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition duration-200 shadow-md">表示 Hiển thị</button>
        </div>

        <div id="errorMessage" class="hidden text-red-600 text-center mb-6 bg-red-100 p-3 rounded-lg"></div>
        <div id="questionsContainer" class="space-y-6"></div>
    </div>

    <footer>
        <p>© 2026 Tài liệu kiểm tra | Thiết kế bởi Thuận / ITM-Group, Ver2.660d</p>
    </footer>
